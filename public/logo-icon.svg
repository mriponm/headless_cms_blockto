<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="rgba(255,106,0,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,106,0,0)"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff8c38"/>
      <stop offset="100%" stop-color="#cc4400"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"/>
  <rect width="512" height="512" rx="110" fill="url(#bgGlow)"/>
  <!-- Body / head -->
  <rect x="152" y="120" width="208" height="200" rx="40" fill="url(#bodyGrad)"/>
  <!-- Eyes -->
  <circle cx="210" cy="215" r="22" fill="white"/>
  <circle cx="302" cy="215" r="22" fill="white"/>
  <!-- Neck connector -->
  <rect x="176" y="306" width="160" height="28" rx="14" fill="url(#bodyGrad)"/>
  <!-- 4 main tentacles -->
  <rect x="165" y="322" width="44" height="96" rx="22" fill="url(#bodyGrad)"/>
  <rect x="220" y="330" width="44" height="94" rx="22" fill="url(#bodyGrad)"/>
  <rect x="275" y="330" width="44" height="94" rx="22" fill="url(#bodyGrad)"/>
  <rect x="318" y="322" width="44" height="96" rx="22" fill="url(#bodyGrad)"/>
</svg>
